<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>HTML</title>
    <style>
        h1{
            font-family: sans-serif;
            width: 700px;
            text-align: center;
            /*vai deixar o texto centralizado a partir
            de sua lagura especificada em width*/
            text-decoration: underline;
        }
        p {
            font-weight: 600;
            font-size: 3em;
            text-decoration: underline;
        }
        body{
            font-size: 16px;
            font-style: italic;
            text-align: center;
        }
        ul{
            text-align: left;
            line-height: 50px;
            /*vai dar espaçamento na lista.*/
        }
        #amarelo {
            background-color: yellow;
        }
        #vermelho {
            background-color: red;
        }
        #marrom {
            background-color: brown;
        }
    </style>
  </head>
  <body>
    <h1>Cores</h1>
    <p>Qual é a sua cor favorita?</p>
    <ul>
      <li id="amarelo">Amarelo</li>
      <li id="vermelho">Vermelho</li>
      <li id="marrom">Marrom</li>
    </ul>
  </body>
</html>
