<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Trybe Travel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
</head>
<body>
    <h1 id='title' class="text-center">Formulário Trybe Travel</h1>
    <form id="main-form" class="container">
        <fieldset>
            <label for="fullName" class="form-label">Nome Completo:
                <input 
                type="text" 
                name="fullName" 
                id="fullName" 
                minlength="10" 
                maxlength="40"
                placeholder="Digite seu nome"
                class="form-control"
                required>
            </label><br>
            <label for="email" class="form-label">Email:
                <input 
                type="email"
                name="email"
                id="email"
                placeholder="Digite seu e-mail"
                maxlength="50"
                minlength="10"
                class="form-control"
                required>
            </label>
            <p>Destino Preferido:</p>
            <label for="Cid" class="form-check-inline">
                <input type="radio" 
                name="destinations" 
                id="Cid"
                value="Cid"
                class="form-check-input">Cidade
            </label>
            <label for="Cam" class="form-check-inline">
                <input type="radio" 
                name="destinations" 
                id="Cam" 
                value="Campo" 
                required
                class="form-check-input">Campo
            </label>
            <label for="Pra" class="form-check-inline">
                <input type="radio" 
                name="destinations" 
                id="Pra" 
                value="Praia" 
                required
                class="form-check-input">Praia
            </label>
            <label for="Mon" class="form-check-inline">
                <input type="radio" 
                name="destinations" 
                id="Mon" 
                value="Montanha" 
                required
                class="form-check-input">Montanha
            </label>
            <br><br>
            <label for="question" class="form-label">
                <p>Por que você deveria ser a pessoa desenvolvedora a ganhar o concurso TrybeTrip?</p>
                <textarea 
                class="form-control"
                name="question" 
                id="question" 
                cols="50"
                placeholder="Digite sua resposta vencedora aqui"
                rows="10" 
                maxlength="500"></textarea>
            <br>
            </label>
            <p>Qual a melhor data para realizar sua viagem?</p>
            <input 
            type="date" 
            id="date" 
            name="date" 
            class="form-control" 
            equired>
            <br>
            <label for="promo"class="form-check-label">
                Gostaria de receber outras incríveis oportunidades oferecidas pela Trybe?
                <input
                class="form-check-input"
                type="checkbox" 
                name="promo" 
                id="promo" 
                required>
            </label>
            <label for="agreement" class="form-check-label">
                Concordo que imagens das minhas férias poderão ser usadas na divulgação de concursos futuros.
                <input
                class="form-check-input"
                type="checkbox" 
                name="agreement" 
                id="agreement" 
                required>
            </label>
        </fieldset>
        <br>
        <button 
        type="submit" 
        id="submit-btn" 
        class="btn btn-primary">Enviar</button>
        <button 
        type="reset" 
        id="clear-btn" 
        class="btn btn-secondary">Limpar</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
