<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trybewarts</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
            <img class="trybewarts-header-logo" src="/images/trybewarts-header-logo.svg" alt="logo do tryberwarts">
        <h1 class="title-header" id="trybewarts-header-title">Trybewarts</h1>
        <form action="" class="trybewarts-login">
            <label for="email-login" class="form-label"></label>
            <input type="email" name="email" class="form-control" id="email-login" placeholder="Email">
            <label for="password-login"></label>
            <input type="password" name="password" class="form-control" id="password-login" placeholder="Senha">
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </header>

    <main>
        <div id="div-evaluatio-form">
            <form action="" id="evaluation-form">
                <h2>Formulário de Avaliação</h2>
                <div id="inputs">
                    <div class="input-left">
                        <label for="input-name"></label>
                        <input type="text" id="input-name" class="form-control" placeholder="Nome">
            
                        <label for="input-lastname"></label>
                        <input type="text" id="input-lastname" class="form-control" placeholder="Sobrenome">
                    </div>
                    <div class="input-rigth">
                        <label for="input-email"></label>
                        <input type="email" name="email-evaluation" class="form-control" id="input-email" placeholder="Email">
                        <div id="select">
                            <label for="house">Casa:</label>
                            <select name="house" class="form-select" id="house">
                                <option value="Gitnória" id="gitnoria-house">Gitnória</option>
                                <option value="Reactpuff" id="reactpuff-house">Reactpuff</option>
                                <option value="Corvinode" id="corvinode-house">Corvinode</option>
                                <option value="Pytherina" id="pytherina-house">Pytherina</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div id="div-check">
                    <div class="conteiner-check">
                            <label for="" id="label-family">Qual sua família?</label>
                            <label>
                                <input type="radio" name="family" value="Frontend">Frontend
                            </label>
                            <label>
                                <input type="radio" name="family" value="Backend">Backend
                            </label>
                            <label>
                                <input type="radio" name="family" value="FullStack">FullStack
                            </label>
                    </div>
                    <div class="conteiner-check">
                        <label id="label-content">Qual conteúdo você está com mais vontade de aprender?</label>
                        <div>
                            <label>
                                <input type="checkbox" class="subject" value="Comunicação">Comunicação
                            </label>
                            <label>
                                <input type="checkbox" class="subject" value="Trabalho em equipe">Trabalho em equipe
                            </label>
                            <label>
                                <input type="checkbox" class="subject" value="Negociação">Negociação
                            </label>
                            <label>
                                <input type="checkbox" class="subject" value="Escuta ativa">Escuta ativa
                            </label>
                            <label>
                                <input type="checkbox" class="subject" value="Métodos de array">Métodos de array
                            </label>
                            <label>
                                <input type="checkbox" class="subject" value="Jest">Jest
                            </label>
                        </div>
                    </div>
                </div>
                <br>
                <div class="assessment">
                    <div>
                        <label for="" id="label-rate">Como você avalia a Trybewarts?</label>
                        <label for="">
                            <input type="radio" name="rate" value="1">1
                        </label>
                        <label>
                            <input type="radio" name="rate" value="2">2
                        </label>
                        <label>
                            <input type="radio" name="rate" value="3">3
                        </label>
                        <label>
                            <input type="radio" name="rate" value="4">4
                        </label>
                        <label>
                            <input type="radio" name="rate" value="5">5
                        </label>
                        <label>
                            <input type="radio" name="rate" value="6">6
                        </label>
                        <label>
                            <input type="radio" name="rate" value="7">7
                        </label>
                        <label>
                            <input type="radio" name="rate" value="8">8
                        </label>
                        <label>
                            <input type="radio" name="rate" value="9">9
                        </label>
                        <label>
                            <input type="radio" name="rate" value="10">10
                        </label>
                    </div>
                    <div>
                        <label for="question" class="textarea">
                            Descreva os principais pontos de aprendizado até aqui (1 hard skill / 1 soft skill):
                        </label>
                        <textarea name="question" id="question" cols="50" rows="4" minlength="20" maxlength="500">Exemplo: JavaScript e ser muito objetivo.</textarea>
                    </div>
                    <div>
                        <label id="label-infos">
                            Você concorda com o uso das informações acima?
                            <input type="checkbox" name="agreement" id="agreement">
                        </label>
                    </div>
                </div>
                <button type="submit" id="submit-btn">Enviar</button>
            </form>
        </div>
        <img src="images/trybewarts-colored.svg" alt="logo colorido do Tryberwarts" id="trybewarts-forms-logo">
    </main>
    <footer>Direitos reservados à Trybewarts©</footer>
    <script src="/script.js"></script>
</body>
</html>
