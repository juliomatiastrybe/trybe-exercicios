<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Campos</title>
</head>
<body>
    <main>
        <h1>Validador de Campos</h1>
        <form action="">
            <input type="text" placeholder="Digite um valor..." id="value">
            <select name="compo" id="option">
                <option value="">Opções</option>
                <option value="Email">Email</option>
                <option value="TIN">CPF</option>
                <option value="Data">Data Nascimento</option>
                <option value="Password">Senha Forte</option>
                <option value="Phone">Telefone</option>
            </select>
            <button id="button">Validar</button>
        </form>
        <p id="answer">Digite o valor, escolha a opção e clique em validar</p>
    </main>
    <script src="src/main.js" type="module"></script>
</body>
</html>
